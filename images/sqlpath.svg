<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200" role="img" aria-label="SQLPath">
  <defs>
    <linearGradient id="sqBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e1b4b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" rx="10" fill="url(#sqBg)"/>
  <!-- terminal window -->
  <rect x="22" y="30" width="276" height="148" rx="8" fill="#111827" stroke="#312e81" stroke-width="1.5"/>
  <rect x="22" y="30" width="276" height="24" rx="8" fill="#1f2937"/>
  <rect x="22" y="46" width="276" height="8" fill="#1f2937"/>
  <g>
    <circle cx="36" cy="42" r="4" fill="#ef4444"/>
    <circle cx="50" cy="42" r="4" fill="#f59e0b"/>
    <circle cx="64" cy="42" r="4" fill="#22c55e"/>
  </g>
  <!-- query text -->
  <g font-family="Menlo, Consolas, monospace" font-size="11">
    <text x="36" y="78" fill="#818cf8">SELECT</text>
    <text x="84" y="78" fill="#e2e8f0">name, score</text>
    <text x="36" y="96" fill="#818cf8">FROM</text>
    <text x="72" y="96" fill="#e2e8f0">students</text>
    <text x="36" y="114" fill="#818cf8">WHERE</text>
    <text x="80" y="114" fill="#e2e8f0">score &gt; 90</text>
    <text x="36" y="132" fill="#818cf8">ORDER BY</text>
    <text x="108" y="132" fill="#e2e8f0">score DESC;</text>
  </g>
  <!-- result row blocks -->
  <g fill="#34d399" opacity="0.85">
    <rect x="36" y="146" width="40" height="9" rx="2"/>
    <rect x="82" y="146" width="26" height="9" rx="2"/>
    <rect x="36" y="160" width="52" height="9" rx="2"/>
    <rect x="94" y="160" width="20" height="9" rx="2"/>
  </g>
  <text x="282" y="166" text-anchor="end" font-family="Menlo, Consolas, monospace" font-size="10" fill="#6366f1">SQLite&#183;WASM</text>
  <!-- brand prompt -->
  <g transform="translate(248,70)">
    <rect x="-2" y="-14" width="44" height="34" rx="8" fill="#6366f1"/>
    <text x="20" y="9" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="18" font-weight="700" fill="#ffffff">&gt;_</text>
  </g>
</svg>
